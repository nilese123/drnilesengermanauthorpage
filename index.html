<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Niles P. Engerman | Author</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; overflow-x: hidden; margin: 0; }
        .neon-text-pink { text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
        
        /* The Synthwave Sun */
        .retro-sun {
            position: fixed;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: linear-gradient(to bottom, #ff00ff 0%, #ff8000 100%);
            border-radius: 50%;
            filter: blur(20px);
            opacity: 0.3;
            z-index: -1;
        }

        /* Animated Scanlines */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }

        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="retro-sun"></div>
    <div class="scanlines"></div>
 <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <nav class="fixed top-0 w-full z-50 border-b border-cyan-500/30 bg-black/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="navigateTo('home')">
                <span class="brand text-sm md:text-lg font-black tracking-widest text-white neon-text-pink italic uppercase">Dr. Niles Engerman</span>
            </div>
            <div class="hidden md:flex items-center gap-10 text-[11px] uppercase tracking-[0.3em] font-bold">
                <button onclick="navigateTo('store')" class="text-cyan-400 hover:text-pink-500 transition-all">Store</button>
                <button onclick="navigateTo('arcade')" class="text-cyan-400 hover:text-pink-500 transition-all">Arcade</button>
                <button onclick="navigateTo('gallery')" class="text-cyan-400 hover:text-pink-500 transition-all">Gallery</button>
                <button onclick="navigateTo('movies')" class="text-cyan-400 hover:text-pink-500 transition-all">Movies</button>
                <button onclick="navigateTo('talks')" class="text-cyan-400 hover:text-pink-500 transition-all">Talks</button>
                <button onclick="navigateTo('faq')" class="text-cyan-400 hover:text-pink-500 transition-all">FAQ</button>
            </div>
            <button id="music-btn" class="flex items-end gap-1 h-5 group" title="Toggle Synthwave Score">
                <span class="ml-2 text-pink-500 group-hover:text-cyan-400 transition-colors text-[10px] font-bold tracking-widest">SCORE</span>
            </button>
        </div>
    </nav>

    <main id="main-content"></main>

    <footer class="py-20 px-6 bg-black relative border-t border-cyan-500/20">
        <div class="max-w-7xl mx-auto text-center text-[10px] tracking-[0.4em] text-slate-600 uppercase font-bold">
            &copy; 2026 Engerman Educational Consulting, LLC
        </div>
    </footer>

    <script>
        const music = document.getElementById('bg-music');
        const musicBtn = document.getElementById('music-btn');
        const mainContent = document.getElementById('main-content');
        let isPlaying = false;

        musicBtn.addEventListener('click', () => {
            if (isPlaying) {
                music.pause();
            } else {
                music.play().catch(e => console.log("Interaction required"));
            }
            isPlaying = !isPlaying;
        });

        const contentData = {
            home: `
                <div class="pt-40 pb-20 px-6 max-w-4xl mx-auto fade-in text-center">
                    <h1 class="text-6xl font-black mb-6 italic text-white neon-text-pink uppercase tracking-tighter">Neon Night-Time Reads</h1>
                    <p class="text-xl text-cyan-400 mb-8 leading-relaxed font-bold tracking-wide italic">Digital Noir and Middle-Grade Adventures.</p>
                    <div class="p-6 bg-black/40 border border-cyan-500/30 inline-block">
                        <h4 class="text-orange-400 font-bold mb-2 uppercase tracking-widest">Latest Release</h4>
                        <p class="text-slate-400">@tonyli1989 - Available Now</p>
                    </div>
                </div>`,
            store: `<div class="pt-40 px-6 max-w-4xl mx-auto"> <h2 class="text-4xl text-white font-bold mb-8 italic uppercase text-pink-500">Store</h2> <p class="text-slate-400 italic">Signed copies and consulting services coming soon...</p> </div>`,
            arcade: `<div class="pt-40 px-6 max-w-4xl mx-auto"> <h2 class="text-4xl text-white font-bold mb-8 italic uppercase text-cyan-500">Arcade</h2> <p class="text-slate-400 italic">Retro experiences loading...</p> </div>`,
            gallery: `<div class="pt-40 px-6 max-w-4xl mx-auto"> <h2 class="text-4xl text-white font-bold mb-8 italic uppercase text-pink-500">Gallery</h2> <p class="text-slate-400 italic">Visual artifacts from the 80s and beyond...</p> </div>`,
            movies: `
                <div class="pt-40 pb-20 px-6 max-w-4xl mx-auto fade-in">
                    <h2 class="text-5xl font-black mb-12 italic text-orange-500 uppercase tracking-tighter">VHS CRITIQUES</h2>
                    <div class="space-y-8">
                        <div class="p-6 bg-black/40 border-l-4 border-orange-500">
                            <h3 class="text-2xl font-bold text-white mb-2">Blade Runner (1982)</h3>
                            <p class="text-xs text-orange-300 mb-4 tracking-widest font-bold uppercase">Rating: 10/10 | Status: Maximum Noir</p>
                            <p class="text-slate-400 leading-relaxed">The ultimate transmission. A rain-soaked masterpiece of the future.</p>
                        </div>
                        <div class="p-6 bg-black/40 border-l-4 border-cyan-500">
                            <h3 class="text-2xl font-bold text-white mb-2">Akira (1988)</h3>
                            <p class="text-xs text-cyan-300 mb-4 tracking-widest font-bold uppercase">Rating: 9.5/10 | Status: Explosive</p>
                            <p class="text-slate-400 leading-relaxed">The pinnacle of digital kinetic energy. Superior to modern animation.</p>
                        </div>
                        <div class="p-6 bg-black/40 border-l-4 border-orange-500">
                            <h3 class="text-2xl font-bold text-white mb-2">Back to the Future (1985)</h3>
                            <p class="text-xs text-orange-300 mb-4 tracking-widest font-bold uppercase">Rating: PG | Status: Time-Warped</p>
                            <p class="text-slate-400 leading-relaxed">This is the classic time travel comedy! Escaping terrorists, Marty McFly becomes the very reason why his parents get together. It stands the test of time with a high rewatchability factor and mindbending theories like the bootstrap paradox.</p>
                        </div>
                    </div>
                </div>`,
            talks: `<div class="pt-40 px-6 max-w-4xl mx-auto"> <h2 class="text-4xl text-white font-bold mb-8 italic uppercase text-cyan-500">Talks</h2> <p class="text-slate-400 italic">Speaking engagements and pedagogical workshops...</p> </div>`,
            faq: `<div class="pt-40 px-6 max-w-4xl mx-auto"> <h2 class="text-4xl text-white font-bold mb-8 italic uppercase text-pink-500">FAQ</h2> <p class="text-slate-400 italic">Frequently Asked Questions...</p> </div>`
        };

        function navigateTo(tab) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            if (contentData[tab]) {
                mainContent.innerHTML = contentData[tab];
            }
        }

        window.onload = () => navigateTo('home');
    </script>
</body>
</html>
