<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Niles Paley Engerman | Neon Night-time Reads</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syncopate:wght@400;700&family=Orbitron:wght@400;900&display=swap');
        
        :root {
            --neon-pink: #ff00ff;
            --neon-cyan: #00ffff;
            --neon-purple: #bc13fe;
            --retro-orange: #ff8c00;
        }

        body {
            font-family: 'Space Mono', monospace;
            background-color: #0d0221;
            color: #fff;
            overflow-x: hidden;
            background: linear-gradient(to bottom, #0d0221 0%, #240b36 100%);
            scroll-behavior: smooth;
        }

        h1, h2, h3, h4, .brand {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        /* Glitch Effect */
        .glitch { position: relative; color: white; }
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.8;
        }
        .glitch::before {
            left: 2px; text-shadow: -2px 0 var(--neon-cyan);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }
        .glitch::after {
            left: -2px; text-shadow: -2px 0 var(--neon-pink);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(10px, 9999px, 20px, 0); }
            20% { clip: rect(80px, 9999px, 90px, 0); }
            100% { clip: rect(40px, 9999px, 50px, 0); }
        }
        @keyframes glitch-anim2 {
            0% { clip: rect(60px, 9999px, 70px, 0); }
            30% { clip: rect(10px, 9999px, 30px, 0); }
            100% { clip: rect(80px, 9999px, 100px, 0); }
        }

        .neon-text-pink { text-shadow: 0 0 5px #fff, 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink); }
        .neon-text-cyan { text-shadow: 0 0 5px #fff, 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan); }

        .grid-container {
            position: absolute; width: 100%; height: 100%;
            perspective: 450px; bottom: 0; left: 0;
            overflow: hidden; z-index: 0; pointer-events: none;
        }
        .grid-floor {
            position: absolute; top: 0; left: -50%; width: 200%; height: 200%;
            background-image: linear-gradient(var(--neon-purple) 1px, transparent 1px), linear-gradient(90deg, var(--neon-purple) 1px, transparent 1px);
            background-size: 60px 60px; transform: rotateX(60deg);
            animation: move-grid 4s linear infinite; opacity: 0.3;
        }
        @keyframes move-grid {
            0% { transform: rotateX(60deg) translateY(0); }
            100% { transform: rotateX(60deg) translateY(60px); }
        }

        .sun {
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
            width: 300px; height: 300px;
            background: linear-gradient(to bottom, #ff00ff 0%, #ff8c00 100%);
            border-radius: 50%; box-shadow: 0 0 60px #ff00ff, 0 0 100px #ff8c00;
            z-index: -1;
            mask-image: linear-gradient(to bottom, black 0%, black 50%, transparent 52%, transparent 54%, black 56%, black 64%, transparent 66%, transparent 68%, black 70%, black 78%, transparent 80%, transparent 82%, black 84%, black 92%, transparent 94%, transparent 96%, black 98%, black 100%);
        }

        .scanline {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 100;
        }

        .neon-card {
            background: rgba(13, 2, 33, 0.8);
            border: 1px solid var(--neon-cyan);
            transition: all 0.3s ease;
        }
        .neon-card:hover {
            box-shadow: 0 0 20px var(--neon-cyan);
            transform: translateY(-5px);
        }

        .chrome-text {
            background: linear-gradient(to bottom, #fff 0%, #fff 45%, var(--neon-cyan) 50%, #fff 55%, #fff 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 100% 200%; animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 0 -200%; } }

        .solid-neon-cyan { color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); }

        .visualizer-bar { width: 3px; background: var(--neon-pink); border-radius: 1px; transition: height 0.2s ease; }
        .playing .visualizer-bar:nth-child(1) { animation: bar-rise 0.8s infinite 0.1s; }
        .playing .visualizer-bar:nth-child(2) { animation: bar-rise 0.8s infinite 0.3s; }
        .playing .visualizer-bar:nth-child(3) { animation: bar-rise 0.8s infinite 0.2s; }
        @keyframes bar-rise { 0%, 100% { height: 4px; } 50% { height: 16px; } }

        .fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="relative">

    <div class="scanline"></div>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 border-b border-cyan-500/30 bg-black/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="navigateTo('home')">
                <span class="brand text-sm md:text-lg font-black tracking-widest text-white neon-text-pink italic">DR. NILES PALEY ENGERMAN</span>
            </div>
            
            <div class="hidden md:flex items-center gap-10 text-[11px] uppercase tracking-[0.3em] font-bold">
                <button onclick="navigateTo('store')" class="text-cyan-400 hover:text-pink-500 transition-all">Store</button>
                <button onclick="navigateTo('arcade')" class="text-cyan-400 hover:text-pink-500 transition-all">Arcade</button>
                <button onclick="navigateTo('gallery')" class="text-cyan-400 hover:text-pink-500 transition-all">Gallery</button>
                <button onclick="navigateTo('movies')" class="text-cyan-400 hover:text-pink-500 transition-all">Movies</button>
                <button onclick="navigateTo('talks')" class="text-cyan-400 hover:text-pink-500 transition-all">Talks</button>
                <button onclick="navigateTo('faq')" class="text-cyan-400 hover:text-pink-500 transition-all">FAQ</button>
                
                <button id="music-btn" class="flex items-end gap-1 h-5 group" title="Toggle Synthwave Score">
                    <div class="visualizer-bar"></div>
                    <div class="visualizer-bar"></div>
                    <div class="visualizer-bar"></div>
                    <span class="ml-2 text-pink-500 group-hover:text-cyan-400 transition-colors">SCORE</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Dynamic Content Area -->
    <main id="main-content">
        <!-- Home content injected here by default on load -->
    </main>

    <!-- Footer -->
    <footer class="py-20 px-6 bg-black relative border-t border-cyan-500/20">
        <div class="max-w-7xl mx-auto text-center">
            <div class="brand text-xl md:text-3xl font-black text-pink-500 neon-text-pink italic mb-12 uppercase tracking-tighter">DR. NILES PALEY ENGERMAN</div>
            <div class="flex flex-wrap justify-center gap-6 mb-12 text-[10px] uppercase tracking-widest text-slate-500 font-bold">
                <button onclick="navigateTo('home')" class="hover:text-white">Mainframe</button>
                <button onclick="navigateTo('store')" class="hover:text-white">Store</button>
                <button onclick="navigateTo('arcade')" class="hover:text-white">Arcade</button>
                <button onclick="navigateTo('movies')" class="hover:text-white">Reviews</button>
                <button onclick="navigateTo('faq')" class="hover:text-white">Support</button>
            </div>
            <p class="text-[9px] text-slate-800 tracking-[1em] font-bold">PROCESSED BY NEURAL-NET | 198X-20XX</p>
        </div>
    </footer>

    <script>
        lucide.createIcons();
        
        const music = document.getElementById('bg-music');
        const musicBtn = document.getElementById('music-btn');
        let isPlaying = false;

        musicBtn.addEventListener('click', () => {
            if (isPlaying) {
                music.pause();
                musicBtn.classList.remove('playing');
            } else {
                music.play().catch(e => console.log("User interaction required."));
                musicBtn.classList.add('playing');
            }
            isPlaying = !isPlaying;
        });

        // CONTENT NAVIGATION ENGINE
        const mainContent = document.getElementById('main-content');

        const contentData = {
            home: `
                <header class="relative min-h-screen flex items-center justify-center pt-20 overflow-hidden fade-in">
                    <div class="sun"></div>
                    <div class="grid-container"><div class="grid-floor"></div></div>
                    <div class="max-w-6xl mx-auto z-10 text-center px-6">
                        <p class="text-cyan-300 tracking-[0.8em] text-xs mb-6 uppercase font-bold animate-pulse">Establishing Connection... Welcome to the Sprawl</p>
                        <div class="mb-8">
                            <h1 class="glitch text-4xl md:text-8xl font-black text-white italic leading-tight" data-text="NEON NIGHT-TIME">
                                <span class="chrome-text">NEON NIGHT-TIME</span>
                            </h1>
                            <h1 class="glitch text-4xl md:text-8xl font-black italic mt-2" data-text="READS">
                                <span class="solid-neon-cyan">READS</span>
                            </h1>
                        </div>
                        <p class="text-lg md:text-xl text-cyan-100 max-w-4xl mx-auto mb-12 font-light italic bg-black/60 p-6 border-y border-pink-500/40 backdrop-blur-sm leading-relaxed">
                            Step into the mainframe. Browse the <span class="text-pink-400 font-bold">Store</span> for physical artifacts, play <span class="text-cyan-400 font-bold">Retro Games</span> in the arcade, or decode <span class="text-orange-400 font-bold">1980s Movie Reviews</span>.
                        </p>
                        <div class="flex flex-col sm:flex-row items-center justify-center gap-8">
                            <button onclick="navigateTo('store')" class="w-full sm:w-auto px-12 py-4 border-2 border-cyan-400 text-cyan-400 uppercase tracking-widest font-black bg-black/50 hover:bg-cyan-500 hover:text-black transition-all">Enter Store</button>
                            <button onclick="navigateTo('arcade')" class="w-full sm:w-auto px-12 py-4 border-2 border-white text-white uppercase tracking-widest font-black hover:bg-white hover:text-black transition-all">Play Arcade</button>
                        </div>
                    </div>
                </header>
            `,
            store: `
                <div class="pt-40 pb-20 px-6 max-w-7xl mx-auto fade-in">
                    <h2 class="text-5xl font-black mb-12 italic text-cyan-400 neon-text-cyan">THE ARTIFACT SHOP</h2>
                    <div class="grid md:grid-cols-3 gap-8">
                        <div class="neon-card p-6 border-pink-500">
                            <div class="h-64 bg-slate-900 mb-6 flex items-center justify-center text-pink-500"><i data-lucide="book" class="w-16 h-16"></i></div>
                            <h3 class="text-xl font-bold mb-2">NEON DREAMS (Hardcover)</h3>
                            <p class="text-xs text-slate-400 mb-4">First edition signed by the author.</p>
                            <button class="w-full py-2 bg-pink-600 text-white font-bold text-xs uppercase">Add to Cart - $35</button>
                        </div>
                        <div class="neon-card p-6 border-cyan-500">
                            <div class="h-64 bg-slate-900 mb-6 flex items-center justify-center text-cyan-500"><i data-lucide="monitor" class="w-16 h-16"></i></div>
                            <h3 class="text-xl font-bold mb-2">DIGITAL MANIFESTO (PDF)</h3>
                            <p class="text-xs text-slate-400 mb-4">Instant transmission to your neural link.</p>
                            <button class="w-full py-2 bg-cyan-600 text-white font-bold text-xs uppercase">Add to Cart - $12</button>
                        </div>
                        <div class="neon-card p-6 border-orange-500">
                            <div class="h-64 bg-slate-900 mb-6 flex items-center justify-center text-orange-500"><i data-lucide="shirt" class="w-16 h-16"></i></div>
                            <h3 class="text-xl font-bold mb-2">RETROWAVE TEE</h3>
                            <p class="text-xs text-slate-400 mb-4">100% cotton. Screen-printed in the sprawl.</p>
                            <button class="w-full py-2 bg-orange-600 text-white font-bold text-xs uppercase">Add to Cart - $28</button>
                        </div>
                    </div>
                </div>
            `,
            arcade: `
                <div class="pt-40 pb-20 px-6 max-w-7xl mx-auto fade-in text-center">
                    <h2 class="text-5xl font-black mb-12 italic text-pink-500 neon-text-pink">SYSTEM ARCADE</h2>
                    <div class="aspect-video bg-black border-4 border-cyan-500 flex flex-col items-center justify-center">
                        <i data-lucide="gamepad-2" class="w-24 h-24 text-cyan-500 animate-pulse mb-4"></i>
                        <p class="text-2xl font-bold tracking-widest text-white">GAME MODULE LOADING...</p>
                        <p class="text-slate-500 mt-4">Insert 25¢ to continue</p>
                    </div>
                </div>
            `,
            gallery: `
                <div class="pt-40 pb-20 px-6 max-w-7xl mx-auto fade-in">
                    <h2 class="text-5xl font-black mb-12 italic text-white underline decoration-pink-500">VISUAL ARCHIVES</h2>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="aspect-square bg-slate-900 border border-cyan-500 flex items-center justify-center">PHOTO 01</div>
                        <div class="aspect-square bg-slate-900 border border-cyan-500 flex items-center justify-center">PHOTO 02</div>
                        <div class="aspect-square bg-slate-900 border border-cyan-500 flex items-center justify-center">PHOTO 03</div>
                        <div class="aspect-square bg-slate-900 border border-cyan-500 flex items-center justify-center">PHOTO 04</div>
                        <div class="aspect-square bg-slate-900 border border-cyan-500 flex items-center justify-center">PHOTO 05</div>
                        <div class="aspect-square bg-slate-900 border border-cyan-500 flex items-center justify-center">PHOTO 06</div>
                        <div class="aspect-square bg-slate-900 border border-cyan-500 flex items-center justify-center">PHOTO 07</div>
                        <div class="aspect-square bg-slate-900 border border-cyan-500 flex items-center justify-center">PHOTO 08</div>
                    </div>
                </div>
            `,
            movies: `
                <div class="pt-40 pb-20 px-6 max-w-4xl mx-auto fade-in">
                    <h2 class="text-5xl font-black mb-12 italic text-orange-500">VHS CRITIQUES</h2>
                    <div class="space-y-12">
                        <div class="p-6 bg-black/40 border-l-4 border-orange-500">
                            <h3 class="text-2xl font-bold text-white mb-2">Blade Runner (1982)</h3>
                            <p class="text-xs text-orange-300 mb-4 tracking-widest font-bold">RATING: 10/10 | NOIR STATUS: MAXIMUM</p>
                            <p class="text-slate-400 leading-relaxed">The ultimate transmission. A rain-soaked masterpiece that perfectly captures the aesthetic of the future we were promised.</p>
                        </div>
                        <div class="p-6 bg-black/40 border-l-4 border-cyan-500">
                            <h3 class="text-2xl font-bold text-white mb-2">Akira (1988)</h3>
                            <p class="text-xs text-cyan-300 mb-4 tracking-widest font-bold">RATING: 9.5/10 | NOIR STATUS: EXPLOSIVE</p>
                            <p class="text-slate-400 leading-relaxed">The pinnacle of digital kinetic energy. Still superior to most modern renderings.</p>
                        </div>
                    </div>
                </div>
            `,
            talks: `
                <div class="pt-40 pb-20 px-6 max-w-5xl mx-auto fade-in">
                    <h2 class="text-5xl font-black mb-12 italic text-purple-400">BOOK DIALOGUES</h2>
                    <div class="grid gap-6">
                        <div class="neon-card p-6 flex justify-between items-center">
                            <div>
                                <h4 class="font-bold text-white">THE FUTURE OF NOIR</h4>
                                <p class="text-xs text-slate-500">Keynote at CyberCon 2024</p>
                            </div>
                            <button class="px-6 py-2 border border-purple-500 text-purple-400 text-xs">WATCH TRANSITION</button>
                        </div>
                        <div class="neon-card p-6 flex justify-between items-center">
                            <div>
                                <h4 class="font-bold text-white">SYNTHETIC STORYTELLING</h4>
                                <p class="text-xs text-slate-500">Author Talk - Tokyo Archives</p>
                            </div>
                            <button class="px-6 py-2 border border-purple-500 text-purple-400 text-xs">WATCH TRANSITION</button>
                        </div>
                    </div>
                </div>
            `,
            faq: `
                <div class="pt-40 pb-20 px-6 max-w-4xl mx-auto fade-in">
                    <h2 class="text-5xl font-black mb-12 italic text-white underline decoration-cyan-500">FREQUENTLY ASKED</h2>
                    <div class="space-y-8">
                        <div>
                            <h4 class="text-cyan-400 font-bold mb-2">How can I contact the author?</h4>
                            <p class="text-slate-400">Direct neural interface or via the secure mail terminal below.</p>
                        </div>
                        <div class="border-t border-slate-800 pt-8">
                            <h4 class="text-pink-400 font-bold mb-2">Are the books available in physical formats?</h4>
                            <p class="text-slate-400">Yes, we believe in the sanctity of physical artifacts. Visit the Store tab.</p>
                        </div>
                        <div class="border-t border-slate-800 pt-8">
                            <h4 class="text-orange-400 font-bold mb-2">What inspires the neon aesthetic?</h4>
                            <p class="text-slate-400">A mix of 80s tech-optimism and the digital decay of the modern era.</p>
                        </div>
                    </div>
                </div>
            `
        };

        function navigateTo(tab) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            if (contentData[tab]) {
                mainContent.innerHTML = contentData[tab];
                lucide.createIcons();
            }
        }

        // Initialize Home on load
        window.onload = () => navigateTo('home');
    </script>
</body>
</html>
