<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Dr. Niles P. Engerman | Author</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background:#000; color:#fff; font-family:sans-serif; overflow-x:hidden; margin:0; }
        .neon { text-shadow: 0 0 10px #f0f, 0 0 20px #f0f; font-style:italic; text-transform:uppercase; }
        .grid { position:fixed; bottom:0; left:50%; transform:translateX(-50%) perspective(500px) rotateX(60deg); width:200vw; height:50vh; background-image: linear-gradient(rgba(0,255,255,0.2) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,255,0.2) 1px, transparent 1px); background-size: 50px 50px; z-index:-1; mask-image: linear-gradient(to top, #000, transparent); }
        .sun { position:fixed; bottom:-50px; left:50%; transform:translateX(-50%); width:600px; height:600px; background:linear-gradient(#f0f, #ff8000); border-radius:50%; filter:blur(20px); opacity:0.4; z-index:-1; mask-image:repeating-linear-gradient(0deg, #000, #000 15px, transparent 20px); }
        .btn { border:2px solid #ff8000; padding:10px 20px; color:#ff8000; text-transform:uppercase; font-family:monospace; transition: 0.3s; cursor:pointer; }
        .btn:hover { background:#ff8000; color:#000; box-shadow: 0 0 20px #ff8000; }
        .sprawl { font-family:monospace; color:#0ff; text-transform:uppercase; letter-spacing:0.3em; text-shadow:0 0 5px #0ff; animation: pulse 2s infinite alternate; }
        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="sun"></div><div class="grid"></div>
    <audio id="ms" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio>
    <nav class="fixed top-0 w-full p-6 border-b border-cyan-500/30 bg-black/80 backdrop-blur-md flex justify-between items-center z-50">
        <span class="neon font-black tracking-widest cursor-pointer text-lg" onclick="go('home')">Dr. Niles Engerman</span>
        <div class="flex gap-6 text-[10px] uppercase font-bold text-cyan-400">
            <button onclick="go('home')">Home</button><button onclick="go('store')">Store</button><button onclick="go('movies')">Movies</button>
            <button onclick="m()" class="text-pink-500 border border-pink-500 px-2">SCORE</button>
        </div>
    </nav>
    <main id="content" class="pt-40 text-center px-6"></main>
    <script>
        const ms = document.getElementById('ms'); let ply = false;
        const pages = {
            home: `<h1 class="text-6xl font-black neon mb-6">Neon Night-Time Reads</h1><p class="text-xl text-cyan-400 mb-8 font-bold italic">Digital Noir and Middle-Grade Adventures.</p><p class="sprawl mb-10 text-sm">Welcome to the sprawl</p><a href="https://www.amazon.com/Tonyli1989-Niles-Engerman/dp/B0GJPL8RPK/" target="_blank"><button class="btn font-bold">LATEST RELEASE: @tonyli1989</button></a>`,
            store: `<h2 class="text-4xl text-pink-500 font-black mb-8 italic uppercase">The Sprawl Store</h2><p class="text-slate-400 mb-8 italic text-sm">Signed copies and exclusive @tonyli1989 merchandise coming soon.</p><button class="btn opacity-50 cursor-not-allowed">Sector Closed</button>`,
            movies: `<h2 class="text-4xl text-orange-500 font-black mb-8 italic uppercase">VHS Critiques</h2><div class="max-w-2xl mx-auto text-left space-y-4 text-sm"><div class="p-4 border-l-4 border-orange-500 bg-white/5"><b>Blade Runner:</b> Maximum Noir. A rain-soaked masterpiece.</div><div class="p-4 border-l-4 border-cyan-500 bg-white/5"><b>Back to the Future:</b> Marty McFly must fix the timeline before he fades away.</div></div>`
        };
        function go(p) { document.getElementById('content').innerHTML = pages[p]; window.scrollTo(0,0); }
        function m() { if(ply){ms.pause();}else{ms.play();} ply=!ply; }
        go('home');
    </script>
</body>
</html>
