<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dr. Niles P. Engerman | Author</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { background:#000; color:#fff; font-family:sans-serif; overflow-x:hidden; margin:0; }
        .neon { text-shadow: 0 0 10px #f0f, 0 0 20px #f0f; font-style:italic; text-transform:uppercase; }
        .sun { position:fixed; bottom:-120px; left:50%; transform:translateX(-50%); width:600px; height:600px; background:linear-gradient(#f0f, #ff8000); border-radius:50%; filter:blur(20px); opacity:0.3; z-index:-1; }
        .btn { border:2px solid #ff8000; padding:6px; color:#ff8000; text-transform:uppercase; font-family:monospace; transition: 0.2s; cursor:pointer; font-size: 8px; background: rgba(0,0,0,0.9); text-align: center; min-width: 80px; }
        .btn:hover { background:#ff8000; color:#000; box-shadow: 0 0 15px #ff8000; }
        .sprawl { font-family:monospace; color:#0ff; text-transform:uppercase; letter-spacing:0.3em; text-shadow:0 0 5px #0ff; animation: pulse 2s infinite alternate; }
        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }
        
        /* Arcade Cabinet Styling */
        .cabinet { width: 280px; height: 450px; background: #111; border: 4px solid #ff00ff; box-shadow: 0 0 20px #ff00ff; border-radius: 10px; margin: 0 auto; position: relative; display: flex; flex-direction: column; align-items: center; background-image: linear-gradient(to bottom, #222 0%, #000 100%); }
        .marquee { width: 90%; height: 50px; background: #ff00ff; margin-top: 10px; border: 2px solid #fff; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 10px #fff; }
        .marquee-text { font-family: 'Press Start 2P', cursive; font-size: 14px; color: #fff; text-shadow: 2px 2px #000; }
        .screen-bezel { width: 85%; height: 200px; background: #222; margin-top: 20px; border: 3px solid #333; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .scanlines { position:absolute; top:0; left:0; width:100%; height:100%; background: repeating-linear-gradient(rgba(0,0,0,0) 0px, rgba(0,0,0,0) 1px, rgba(0,0,0,0.4) 2px); pointer-events:none; z-index:5; }
        .control-panel { width: 100%; height: 60px; background: #333; margin-top: auto; border-top: 4px solid #ff00ff; display: flex; justify-content: space-around; align-items: center; }
        .joystick { width: 20px; height: 20px; background: red; border-radius: 50%; box-shadow: 0 5px #800; }
        .arcade-button { width: 15px; height: 15px; background: #0f0; border-radius: 50%; box-shadow: 0 3px #080; }
        #game { width: 100%; height: 400px; background: #000; display: none; }
    </style>
</head>
<body>
    <div class="sun"></div>
    <audio id="ms" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio>
    
    <nav class="fixed top-0 w-full p-6 border-b border-cyan-500/30 bg-black/80 backdrop-blur-md flex justify-between items-center z-50">
        <span class="neon font-black tracking-widest cursor-pointer text-lg" onclick="go('home')">Dr. Niles Engerman</span>
        <div class="flex gap-4 text-[9px] uppercase font-bold text-cyan-400">
            <button onclick="go('home')">Home</button>
            <button onclick="go('store')">Store</button>
            <button onclick="go('arcade')">Arcade</button>
            <button onclick="go('movies')">Movies</button>
            <button onclick="m()" class="text-pink-500 border border-pink-500 px-1">SCORE</button>
        </div>
    </nav>

    <main id="content" class="pt-28 pb-20 text-center px-6 min-h-[90vh] relative z-10"></main>

    <footer class="w-full py-8 text-center border-t border-cyan-500/20 bg-black relative z-50">
        <p class="text-[10px] tracking-[0.4em] text-slate-500 uppercase font-bold">&copy; 2026 Engerman Educational Consulting, LLC</p>
    </footer>

    <script>
        const ms = document.getElementById('ms'); let ply = false;
        
        let reviews = {
            "Blade Runner":"A rain-soaked masterpiece.",
            "Back to the Future (1985)":"Rating: PG. This is the classic time travel comedy! Escaping terrorists, Marty McFly becomes the very reason why his parents get together. Given this movie is over 40 years old (at the time of this review), I encourage viewers to rewatch for its more subtle points, underscoring some of the more mindbending and macabre theories behind time travel. This film is an amazing feat, as it’s stood the test of time, availing itself to a high rewatchability factor.",
            "The Terminator (1984)":"Rating: R. What makes this film so great is its relentless bleakness; from the first frame to the last, hope is a luxury that this movie is not selling. Why is this great? Because this bleak atmosphere is exactly what our titular character, The Terminator (Arnold Schwarzenegger), is going for.",
            "Aliens":"High-tension sci-fi.",
            "Robocop (1987)":"Rating: R. Where does one start?! Cyborgs, toxic waste, heroes, and Detroit. Jump into your titanium suit as you follow Robocop, a valiant human turned cyborg, as he goes on a quest to exact vengeance on his 'murderers' while trying to recapture his humanity.",
            "Predator":"Invisible hunter.",
            "Die Hard":"High-rise action.",
            "Tron":"Digital pioneer.",
            "Ghostbusters":"Paranormal comedy.",
            "The Thing":"Practical horror.",
            "Escape From NY":"Snake Plissken.",
            "Akira":"Anime transmission.",
            "WarGames":"Global simulation.",
            "Big Trouble":"Little China.",
            "The Lost Boys (1987)":"Rating: R. Corey Haim and Corey Feldman lead a quest to expose the vampires who creep along the boardwalk.",
            "Lucas (1986)":"Rating: PG-13. The story of brilliant social outcast Lucas, bent on winning over his crush, Maggie.",
            "Gremlins (1984)":"Rating: PG. Don’t get them wet, don’t expose them to light, and definitely don't feed them after midnight.",
            "Sixteen Candles (1984)":"Rating: PG. Samantha Baker's family forgot her birthday. A neon-drenched ride through 1980s Chicago's North Shore.",
            "Commando (1985)":"Rating: R. Arnold is John Matrix on a mission to save his daughter.",
            "Ferris Bueller’s Day Off (1986)":"Rating: PG-13. Ferris ditches school for the best day ever in a 1961 Ferrari.",
            "Beverly Hills Cop (1984)":"Rating: R. Detroit cop Axel Foley tracking a killer in Beverly Hills.",
            "Weird Science (1985)":"Rating: PG-13. Nerds use a computer to create the perfect girlfriend."
        };
        for(let i=23; i<=100; i++) { reviews[`Tape Slot ${i}`] = "Transmission pending... Insert new data here."; }

        // Ultimate Game Stash Integration
        function startGame() {
            document.getElementById("arcade-view").style.display = "none";
            const gameDiv = document.getElementById("game");
            gameDiv.style.display = "block";
            
            EJS_player = "#game";
            EJS_core = "nes";
            EJS_color = "#000000";
            EJS_startOnLoaded = true;
            EJS_pathtodata = "https://cdn.jsdelivr.net/gh/a456pur/seraph@81f551ca0aa8e3d6018d32d8ac5904ac9bc78f76/storage/emulatorjs/data";
            EJS_gameUrl = "https://cdn.jsdelivr.net/gh/bubbls/UGS-file-encryption@07dd631136afe70d5b36871e4f387bc96fa4c261/Contra%20(USA).zip";
            
            loadGame();
        }

        function loadGame() {
            var script1 = document.createElement("script");
            script1.src = "https://cdn.jsdelivr.net/gh/a456pur/seraph@81f551ca0aa8e3d6018d32d8ac5904ac9bc78f76/storage/emulatorjs/data/loader.js";
            document.body.appendChild(script1);
            
            var script2 = document.createElement("script");
            script2.src = "https://cdn.jsdelivr.net/gh/a456pur/seraph@ae2fcc6d6a9cd051654fcc0519080db1f79cf2a7/storage/js/cloak.js";
            document.body.appendChild(script2);
        }

        function showReview(t) {
            document.getElementById('content').innerHTML = `
                <button onclick="go('movies')" class="mb-4 text-cyan-400 text-[10px] uppercase tracking-widest">← Return to Library</button>
                <h2 class="text-3xl text-orange-500 font-black mb-4 italic uppercase">${t}</h2>
                <div class="max-w-xl mx-auto p-6 border border-orange-500 bg-black/95 text-left text-slate-300 italic shadow-[0_0_15px_rgba(255,128,0,0.3)]">${reviews[t]}</div>`;
        }

        const pages = {
            home: `<h1 class="text-5xl font-black neon mb-6">Neon Night-Time Reads</h1><p class="text-xl text-cyan-400 mb-8 font-bold italic">Digital Noir and Middle-Grade Adventures.</p><p class="sprawl mb-10 text-sm">Welcome to the sprawl</p><a href="https://www.amazon.com/Tonyli1989-Niles-Engerman/dp/B0GJPL8RPK/" target="_blank"><button class="btn font-bold">LATEST RELEASE: @tonyli1989</button></a>`,
            store: `<h2 class="text-4xl text-pink-500 font-black mb-8 italic uppercase">The Sprawl Store</h2><p class="text-slate-400 mb-8 italic text-sm">Signed copies and exclusive @tonyli1989 merchandise coming soon.</p><button class="btn opacity-50 cursor-not-allowed">Sector Closed</button>`,
            arcade: `
                <h2 class="text-4xl text-cyan-500 font-black mb-8 italic uppercase">Neural Arcade</h2>
                <div id="arcade-view">
                    <div class="cabinet">
                        <div class="marquee"><span class="marquee-text">CONTRA</span></div>
                        <div class="screen-bezel">
                            <div class="scanlines"></div>
                            <svg width="100%" height="100%" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
                                <rect width="200" height="120" fill="#000" />
                                <text x="50%" y="45" text-anchor="middle" font-family="'Press Start 2P', cursive" font-size="18" fill="#f00" stroke="#fff" stroke-width="0.5">CONTRA</text>
                                <text x="50%" y="65" text-anchor="middle" font-family="'Press Start 2P', cursive" font-size="6" fill="#fff">©1987 KONAMI</text>
                                <rect x="40" y="80" width="8" height="20" fill="#0ff" /><rect x="150" y="80" width="8" height="20" fill="#f0f" />
                            </svg>
                        </div>
                        <div class="control-panel">
                            <div class="joystick"></div>
                            <div class="flex gap-2"><div class="arcade-button"></div><div class="arcade-button" style="background:red; box-shadow: 0 3px #800;"></div></div>
                        </div>
                    </div>
                    <button id="startButton" onclick="startGame()" class="btn py-4 mt-8 w-64 text-lg" style="font-family:'Press Start 2P', cursive; background:#4CAF50; color:white; border:none;">INSERT COIN</button>
                </div>
                <div id="game" class="max-w-2xl mx-auto"></div>`,
            movies: `
                <h2 class="text-3xl text-orange-500 font-black mb-4 italic uppercase">VHS Library</h2>
                <div class="inline-block p-4 border border-orange-500 bg-black mb-8 shadow-[0_0_20px_#ff8000]">
                    <svg width="220" height="130" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="mx-auto opacity-90"><rect x="1" y="4" width="22" height="16" rx="1" fill="#111" stroke="#ff8000" stroke-width="0.5"/><rect x="3" y="7" width="18" height="10" rx="0.5" fill="#222" stroke="#ff8000" stroke-width="0.3"/><circle cx="7" cy="12" r="2.5" stroke="#ff8000" stroke-width="0.5"/><circle cx="7" cy="12" r="1" fill="#ff8000"/><circle cx="17" cy="12" r="2.5" stroke="#ff8000" stroke-width="0.5"/><circle cx="17" cy="12" r="1" fill="#ff8000"/><rect x="10" y="10" width="4" height="4" stroke="#ff8000" stroke-width="0.3"/></svg>
                </div>
                <div class="grid grid-cols-3 md:grid-cols-5 lg:grid-cols-10 gap-1 max-w-6xl mx-auto pb-10">
                    ${Object.keys(reviews).map(t => `<button onclick="showReview('${t}')" class="btn">${t}</button>`).join('')}
                </div>`
        };

        function go(p) { document.getElementById('content').innerHTML = pages[p]; window.scrollTo(0,0); }
        function m() { if(ply){ms.pause();}else{ms.play();} ply=!ply; }
        go('home');
    </script>
</body>
</html>
